<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lualearn.com</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #eaffea;
      background-color: #03140d;
      background-image:
        linear-gradient(rgba(24, 96, 59, 0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 96, 59, 0.35) 1px, transparent 1px);
      background-size: 42px 42px;
      animation: grid 9s linear infinite;
      padding: 24px;
    }

    @keyframes grid {
      from {
        background-position: 0 0, 0 0;
      }

      to {
        background-position: 42px 42px, 42px 42px;
      }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(33, 150, 89, 0.16), transparent 45%),
        radial-gradient(circle at bottom, rgba(8, 66, 39, 0.5), transparent 55%);
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 1080px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 18px;
    }

    .app.single {
      width: min(100%, 760px);
      grid-template-columns: 1fr;
    }

    .panel {
      border: 1px solid rgba(88, 255, 159, 0.18);
      border-radius: 28px;
      background: rgba(3, 23, 14, 0.62);
      box-shadow:
        0 0 45px rgba(25, 145, 82, 0.18),
        inset 0 0 25px rgba(44, 255, 142, 0.04);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .side {
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
    }

    .head {
      padding: 20px;
      border-bottom: 1px solid rgba(116, 255, 177, 0.12);
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .sub {
      color: rgba(210, 255, 224, 0.68);
      font-size: 14px;
      line-height: 1.45;
    }

    .threads {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      overflow: auto;
    }

    .thread {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(116, 255, 177, 0.12);
      border-radius: 16px;
      padding: 12px;
      color: #eaffea;
      background: rgba(6, 36, 22, 0.56);
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .thread:hover,
    .thread.active {
      transform: translateY(-2px);
      border-color: rgba(109, 255, 156, 0.45);
      background: rgba(10, 52, 31, 0.8);
    }

    .thread strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .thread span {
      display: block;
      color: rgba(210, 255, 224, 0.62);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat {
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
    }

    .chat-top {
      padding: 20px;
      border-bottom: 1px solid rgba(116, 255, 177, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 900;
    }

    .chat-title svg {
      width: 24px;
      height: 24px;
      color: #6dff9c;
    }

    .logout,
    .back {
      border: 1px solid rgba(116, 255, 177, 0.18);
      border-radius: 14px;
      background: rgba(6, 36, 22, 0.6);
      color: rgba(234, 255, 234, 0.84);
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .logout:hover,
    .back:hover {
      transform: translateY(-2px);
      border-color: rgba(109, 255, 156, 0.5);
      background: rgba(10, 52, 31, 0.86);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .messages {
      flex: 1;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      max-height: calc(100vh - 178px);
      min-height: 420px;
    }

    .msg {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 14px;
      border: 1px solid rgba(116, 255, 177, 0.12);
      background: rgba(6, 36, 22, 0.7);
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .msg.me {
      align-self: flex-end;
      color: #04110b;
      background: linear-gradient(135deg, #6dff9c, #20c76a);
    }

    .msg.admin {
      align-self: flex-start;
      background: rgba(10, 52, 31, 0.86);
    }

    .empty {
      margin: auto;
      color: rgba(210, 255, 224, 0.6);
      text-align: center;
      font-size: 14px;
    }

    .form {
      padding: 18px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(116, 255, 177, 0.12);
    }

    .input {
      flex: 1;
      min-height: 48px;
      border: 1px solid rgba(116, 255, 177, 0.18);
      border-radius: 16px;
      outline: none;
      padding: 0 14px;
      color: #eaffea;
      background: rgba(6, 36, 22, 0.7);
      font-size: 15px;
    }

    .input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .send,
    .login {
      min-height: 48px;
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      color: #04110b;
      background: linear-gradient(135deg, #6dff9c, #20c76a);
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .send:hover,
    .login:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.1);
    }

    .send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .login svg {
      width: 23px;
      height: 23px;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 48px);
      width: min(100%, 440px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      padding: 30px;
      text-align: center;
      border: 1px solid rgba(88, 255, 159, 0.18);
      border-radius: 28px;
      background: rgba(3, 23, 14, 0.62);
      box-shadow:
        0 0 45px rgba(25, 145, 82, 0.18),
        inset 0 0 25px rgba(44, 255, 142, 0.04);
      backdrop-filter: blur(14px);
    }

    .login-card h1 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .login-card p {
      color: rgba(210, 255, 224, 0.72);
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side {
        min-height: auto;
      }

      .chat {
        min-height: 70vh;
      }

      .messages {
        max-height: 55vh;
        min-height: 360px;
      }

      .msg {
        max-width: 88%;
      }

      .chat-top,
      .form {
        flex-direction: column;
        align-items: stretch;
      }

      .top-actions {
        width: 100%;
      }

      .logout,
      .back,
      .send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="login" class="login-wrap hidden">
    <section class="login-card">
      <h1>Login</h1>
      <p>Sign in with Discord to continue.</p>
      <a id="loginBtn" class="login" href="#">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.317 4.369A19.791 19.791 0 0 0 15.37 2.85a13.889 13.889 0 0 0-.632 1.304 18.27 18.27 0 0 0-5.476 0A13.889 13.889 0 0 0 8.63 2.85a19.736 19.736 0 0 0-4.947 1.519C.549 9.001-.302 13.52.122 17.974a19.93 19.93 0 0 0 6.073 3.071 14.65 14.65 0 0 0 1.302-2.112 12.93 12.93 0 0 1-2.048-.987c.172-.126.34-.257.502-.391a14.265 14.265 0 0 0 12.098 0c.164.134.332.265.502.391a12.84 12.84 0 0 1-2.052.988 14.57 14.57 0 0 0 1.302 2.111 19.895 19.895 0 0 0 6.077-3.071c.5-5.177-.838-9.654-3.56-13.605ZM8.02 15.23c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.956 2.419-2.157 2.419Zm7.96 0c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.947 2.419-2.157 2.419Z"/>
        </svg>
        <span>Login with Discord</span>
      </a>
    </section>
  </div>

  <main id="app" class="app hidden">
    <aside id="side" class="panel side">
      <div class="head">
        <div class="title">Threads</div>
        <div class="sub" id="userLabel"></div>
      </div>
      <div id="threads" class="threads"></div>
    </aside>

    <section class="panel chat">
      <div class="chat-top">
        <div>
          <div id="chatTitle" class="chat-title"></div>
          <div id="chatSub" class="sub"></div>
        </div>
        <div class="top-actions">
          <a class="back" href="/">Back</a>
          <button id="logout" class="logout">Logout</button>
        </div>
      </div>

      <div id="messages" class="messages"></div>

      <form id="form" class="form">
        <input id="input" class="input" maxlength="800" placeholder="Write message..." autocomplete="off">
        <button id="send" class="send" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(location.search);
    const mode = qs.get("mode") || "";
    const isAnon = mode === "anonymous";
    const allowed = ["key", "script", "ban"];
    let item = allowed.includes(qs.get("item")) ? qs.get("item") : "key";
    let plan = qs.get("plan") || "";
    let me = null;
    let activeUsername = "";
    let activeThread = "";
    let lastPayload = "";
    let messageBusy = false;
    let threadBusy = false;

    const login = document.getElementById("login");
    const app = document.getElementById("app");
    const side = document.getElementById("side");
    const loginBtn = document.getElementById("loginBtn");
    const userLabel = document.getElementById("userLabel");
    const threadsEl = document.getElementById("threads");
    const messagesEl = document.getElementById("messages");
    const chatTitle = document.getElementById("chatTitle");
    const chatSub = document.getElementById("chatSub");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const logout = document.getElementById("logout");

    const icons = {
      anonymous: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/><path d="M8 9h8"/><path d="M8 13h5"/></svg>`,
      key: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2"/><path d="M15.5 7.5l3 3"/><path d="M11.4 11.4a5 5 0 1 1-2.8-2.8"/><path d="M13 9l8-8"/></svg>`,
      script: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 9-4 3 4 3"/><path d="m16 9 4 3-4 3"/><path d="m14 5-4 14"/></svg>`,
      ban: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M5.7 5.7 18.3 18.3"/></svg>`
    };

    function makeThread(v, p) {
      if (v === "key" && p === "30d") return "key:30d";
      if (v === "key" && p === "lifetime") return "key:lifetime";
      return v;
    }

    function metaFromThread(v) {
      if (v === "anonymous") return { item: "anonymous", title: "Anonymous Message" };
      if (v === "key:30d") return { item: "key", title: "Key · 30 Days" };
      if (v === "key:lifetime") return { item: "key", title: "Key · Lifetime" };
      if (v === "script") return { item: "script", title: "Luau Script" };
      if (v === "ban") return { item: "ban", title: "War Tycoon Ban" };
      return { item: "key", title: "Key" };
    }

    async function req(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          "content-type": "application/json",
          ...(options.headers || {})
        }
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || data.message || String(res.status));
      }

      return data;
    }

    function showLogin() {
      login.classList.remove("hidden");
      app.classList.add("hidden");
      loginBtn.href = `/api/auth/login?next=${encodeURIComponent(location.pathname + location.search)}`;
    }

    function showApp(single) {
      login.classList.add("hidden");
      app.classList.remove("hidden");

      if (single) {
        app.classList.add("single");
        side.classList.add("hidden");
      } else {
        app.classList.remove("single");
        side.classList.remove("hidden");
      }
    }

    function setFormEnabled(value, placeholder) {
      input.disabled = !value;
      send.disabled = !value;
      input.placeholder = value ? placeholder : "Select a chat first...";
    }

    function renderTitle(meta, sub) {
      chatTitle.innerHTML = `${icons[meta.item] || icons.key}<span>${meta.title}</span>`;
      chatSub.textContent = sub || "";
    }

    function renderEmpty(text) {
      messagesEl.innerHTML = "";
      const div = document.createElement("div");
      div.className = "empty";
      div.textContent = text;
      messagesEl.appendChild(div);
    }

    function atBottom() {
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 90;
    }

    function renderMessages(messages, force = false) {
      const payload = JSON.stringify(messages);

      if (!force && payload === lastPayload) return;

      const shouldStick = atBottom() || force || !lastPayload;

      lastPayload = payload;
      messagesEl.innerHTML = "";

      if (!messages.length) {
        renderEmpty("No messages yet.");
        return;
      }

      for (const m of messages) {
        const div = document.createElement("div");
        const own = isAnon
          ? Number(m.from_admin) === 0
          : me && me.is_admin
            ? Number(m.from_admin) === 1
            : Number(m.from_admin) === 0;

        div.className = `msg ${own ? "me" : "admin"}`;
        div.textContent = m.body;
        messagesEl.appendChild(div);
      }

      if (shouldStick) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function loadMe() {
      try {
        const data = await req("/api/auth/me");
        if (!data.user) return false;
        me = data.user;
        return true;
      } catch {
        return false;
      }
    }

    async function loadAnonMessages(force = false) {
      if (messageBusy) return;
      messageBusy = true;

      try {
        const data = await req("/api/anon/messages");
        renderTitle(data.meta || metaFromThread("anonymous"), "Live anonymous chat");
        renderMessages(data.messages || [], force);
        setFormEnabled(true, "Write anonymous message...");
      } finally {
        messageBusy = false;
      }
    }

    async function loadMessages(force = false) {
      if (messageBusy) return;
      messageBusy = true;

      try {
        if (me && me.is_admin) {
          if (!activeUsername || !activeThread) {
            renderTitle({ item: "anonymous", title: "Select Chat" }, "Admin mode");
            renderEmpty("Select a chat on the left.");
            setFormEnabled(false, "");
            return;
          }

          const data = await req(`/api/chat/messages?username=${encodeURIComponent(activeUsername)}&thread=${encodeURIComponent(activeThread)}`);
          const meta = data.meta || metaFromThread(activeThread);

          renderTitle(meta, activeThread === "anonymous" ? "Anonymous user" : `User: ${activeUsername}`);
          renderMessages(data.messages || [], force);
          setFormEnabled(true, "Write reply...");
          return;
        }

        activeUsername = me.username;
        activeThread = makeThread(item, plan);

        const data = await req(`/api/chat/messages?item=${encodeURIComponent(item)}&plan=${encodeURIComponent(plan)}`);

        renderTitle(data.meta || metaFromThread(activeThread), "Live chat with admin");
        renderMessages(data.messages || [], force);
        setFormEnabled(true, "Write message...");
      } finally {
        messageBusy = false;
      }
    }

    async function loadThreads(keepSelection = true) {
      if (threadBusy) return;
      threadBusy = true;

      try {
        const data = await req("/api/chat/threads");
        const threads = data.threads || [];

        threadsEl.innerHTML = "";

        if (!threads.length) {
          activeUsername = "";
          activeThread = "";
          threadsEl.innerHTML = `<div class="sub">No messages yet.</div>`;
          renderTitle({ item: "anonymous", title: "Admin Chat" }, "Waiting for messages");
          renderEmpty("No chats yet.");
          setFormEnabled(false, "");
          return;
        }

        const exists = threads.some(t => t.username === activeUsername && t.thread === activeThread);

        if (!keepSelection || !activeUsername || !activeThread || !exists) {
          activeUsername = threads[0].username;
          activeThread = threads[0].thread;
          lastPayload = "";
        }

        for (const t of threads) {
          const meta = t.meta || metaFromThread(t.thread);
          const btn = document.createElement("button");
          btn.className = "thread";

          if (activeUsername === t.username && activeThread === t.thread) {
            btn.classList.add("active");
          }

          btn.innerHTML = `<strong>${t.display || t.username} · ${meta.title}</strong><span>${t.last_body || ""}</span>`;

          btn.onclick = async () => {
            activeUsername = t.username;
            activeThread = t.thread;
            lastPayload = "";
            await loadThreads(true);
            await loadMessages(true);
          };

          threadsEl.appendChild(btn);
        }
      } finally {
        threadBusy = false;
      }
    }

    async function sendMessage(body) {
      send.disabled = true;

      try {
        if (isAnon) {
          await req("/api/anon/messages", {
            method: "POST",
            body: JSON.stringify({ body })
          });

          lastPayload = "";
          await loadAnonMessages(true);
          return;
        }

        if (me && me.is_admin) {
          if (!activeUsername || !activeThread) {
            renderEmpty("Select a chat first.");
            setFormEnabled(false, "");
            return;
          }

          await req("/api/chat/messages", {
            method: "POST",
            body: JSON.stringify({
              username: activeUsername,
              thread: activeThread,
              body
            })
          });

          lastPayload = "";
          await loadThreads(true);
          await loadMessages(true);
          return;
        }

        await req("/api/chat/messages", {
          method: "POST",
          body: JSON.stringify({
            item,
            plan,
            body
          })
        });

        lastPayload = "";
        await loadMessages(true);
      } finally {
        send.disabled = false;
      }
    }

    form.addEventListener("submit", async e => {
      e.preventDefault();

      const body = input.value.trim();

      if (!body) return;

      input.value = "";

      try {
        await sendMessage(body);
      } catch (err) {
        renderEmpty(`Message error: ${err.message}`);
      }
    });

    logout.onclick = async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    };

    function loop(fn, delay) {
      async function tick() {
        try {
          await fn();
        } catch {}
        setTimeout(tick, delay);
      }

      setTimeout(tick, delay);
    }

    async function init() {
      if (isAnon) {
        showApp(true);
        logout.style.display = "none";
        await loadAnonMessages(true);
        loop(() => loadAnonMessages(false), 1000);
        return;
      }

      const ok = await loadMe();

      if (!ok) {
        showLogin();
        return;
      }

      userLabel.textContent = `${me.username}${me.is_admin ? " · admin" : ""}`;

      if (me.is_admin) {
        showApp(false);
        await loadThreads(false);
        await loadMessages(true);

        loop(async () => {
          await loadThreads(true);
          await loadMessages(false);
        }, 1000);

        return;
      }

      showApp(true);
      activeUsername = me.username;
      activeThread = makeThread(item, plan);
      await loadMessages(true);
      loop(() => loadMessages(false), 1000);
    }

    init();
  </script>
</body>
</html>
