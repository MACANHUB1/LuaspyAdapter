<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Олег Борзый</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #eaffea;
      background-color: #03140d;
      background-image:
        linear-gradient(rgba(24, 96, 59, 0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 96, 59, 0.35) 1px, transparent 1px);
      background-size: 42px 42px;
      animation: gridMove 9s linear infinite;
      overflow-x: hidden;
    }

    @keyframes gridMove {
      from {
        background-position: 0 0, 0 0;
      }

      to {
        background-position: 42px 42px, 42px 42px;
      }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(33, 150, 89, 0.16), transparent 45%),
        radial-gradient(circle at bottom, rgba(8, 66, 39, 0.5), transparent 55%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card,
    .price {
      border: 1px solid rgba(88, 255, 159, 0.18);
      border-radius: 28px;
      background: rgba(3, 23, 14, 0.62);
      box-shadow:
        0 0 45px rgba(25, 145, 82, 0.18),
        inset 0 0 25px rgba(44, 255, 142, 0.04);
      backdrop-filter: blur(14px);
    }

    .card {
      padding: 38px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 142px;
      height: 142px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(116, 255, 177, 0.65);
      box-shadow:
        0 0 32px rgba(72, 255, 148, 0.34),
        0 0 0 10px rgba(50, 255, 136, 0.05);
      margin-bottom: 24px;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      text-shadow: 0 0 18px rgba(111, 255, 172, 0.28);
    }

    .tag {
      font-size: 17px;
      color: rgba(210, 255, 224, 0.68);
      margin-bottom: 28px;
    }

    .btn {
      width: 100%;
      max-width: 240px;
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.6px;
      color: #04110b;
      border-radius: 16px;
      background: linear-gradient(135deg, #6dff9c, #20c76a);
      box-shadow:
        0 12px 28px rgba(32, 199, 106, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
      box-shadow:
        0 16px 36px rgba(32, 199, 106, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn img {
      width: 23px;
      height: 23px;
      filter: brightness(0);
    }

    .price {
      padding: 24px;
    }

    .price-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 16px;
      text-align: center;
      text-shadow: 0 0 18px rgba(111, 255, 172, 0.22);
    }

    .price-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .price-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(116, 255, 177, 0.14);
      border-radius: 16px;
      background: rgba(6, 36, 22, 0.55);
    }

    .price-name {
      font-size: 16px;
      font-weight: 700;
      color: rgba(234, 255, 234, 0.92);
    }

    .price-cost {
      font-size: 17px;
      font-weight: 900;
      color: #6dff9c;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .card {
        padding: 32px 22px;
        border-radius: 24px;
      }

      .price {
        padding: 20px;
        border-radius: 24px;
      }

      .avatar {
        width: 124px;
        height: 124px;
      }

      .name {
        font-size: 26px;
      }

      .price-item {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img class="avatar" src="1.png" alt="Олег Борзый">
      <h1 class="name">Олег Борзый</h1>
      <p class="tag">@lua.spy</p>
      <a class="btn" href="https://discord.gg/wqxnnNfjZ5" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn.simpleicons.org/discord/000000" alt="">
        <span>M5WARE</span>
      </a>
    </section>

    <section class="price">
      <h2 class="price-title">PRICE</h2>
      <div class="price-list">
        <div class="price-item">
          <span class="price-name">Luau Script</span>
          <span class="price-cost">2$</span>
        </div>
        <div class="price-item">
          <span class="price-name">War Tycoon Ban</span>
          <span class="price-cost">1.5$</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
